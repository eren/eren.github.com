# !boxes -d shell -p a1 -s 80

################################################################################
#                                                                              #
# General configuration for posts, its title link and rendering                #
#                                                                              #
################################################################################
auto: false
pygments: true
permalink: /blog/:year/:month/:day/:title
markdown: maruku
maruku:
    use_divs: true
    use_tex: true
    png_engine: blahtex
    png_dir: images/latex/
    png_url: /images/latex/

exclude:
    - Makefile
    - README.md
    - links.txt
    - CNAME

################################################################################
#                                                                              #
# Website configuration                                                        #
#                                                                              #
################################################################################
domain: localhost:4000
# url prefix for loading images, css in different domains. No slahs at the end.
#base_url: http://cs.bilgi.edu.tr/~eturkay/_site
base_url: http://erenturkay.com

#paginate: 2
#paginate_file: blog/index.html

disqus_developer: 1
disqus_shortname: erenturkayblog
sitemap_exclude: /test/

google_analytics_id: UA-35983607-1

# number of posts in the main page as "Latest entries"
num_of_post_in_main: 3

description: Eren Türkay Web Sayfası, Eren Turkay, blog, qwzxcv, pardus, linux, ta1aet,
             hamradio, amatör telsiz, ağ 
meta:
    - name: keywords 
      content: Eren Türkay, Eren Turkay, kimdir, blog, qwxzcv,
               qwzxcv.wordpress.com, linux, pardus, özgürlükiçin,
               amatör telsiz, hamradio
